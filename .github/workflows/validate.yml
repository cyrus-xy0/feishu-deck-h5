name: validate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  validate:
    name: build + static + repository tests
    runs-on: ubuntu-latest
    timeout-minutes: 12

    defaults:
      run:
        working-directory: skills/feishu-deck-h5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify required files
        run: |
          test -f assets/feishu-deck.css || (echo "MISSING: feishu-deck.css" && exit 1)
          test -f assets/feishu-deck.js  || (echo "MISSING: feishu-deck.js"  && exit 1)
          test -f assets/edit-mode/deck-edit-mode.css || (echo "MISSING: edit-mode/deck-edit-mode.css" && exit 1)
          test -f assets/edit-mode/deck-edit-mode.js  || (echo "MISSING: edit-mode/deck-edit-mode.js"  && exit 1)
          test -f assets/validate.py     || (echo "MISSING: validate.py"     && exit 1)
          test -f _body.partial.html     || (echo "MISSING: _body.partial.html" && exit 1)
          test -f build.sh               || (echo "MISSING: build.sh"        && exit 1)

      - name: Verify brand assets present (private repo only)
        run: |
          for f in lark-logo.png lark-logo-mono-white.png lark-cover-bg.jpg \
                   lark-section-bg.jpg lark-content-bg.jpg lark-slogan.png; do
            test -f "assets/$f" || (echo "MISSING brand asset: $f" && exit 1)
          done

      - name: JS syntax check
        run: |
          node --check assets/feishu-deck.js
          node --check assets/edit-mode/deck-edit-mode.js
          node --check assets/audits.js

      - name: CSS sanity (balanced braces)
        run: |
          python3 -c "
          for path in ('assets/feishu-deck.css', 'assets/edit-mode/deck-edit-mode.css'):
              with open(path) as f:
                  c = f.read()
              o, n = c.count('{'), c.count('}')
              if o != n:
                  print(f'CSS UNBALANCED {path}: open={o} close={n}')
                  exit(1)
              print(f'CSS balanced {path}: {o}/{n}')
          "

      - name: Preflight self-test (CI environment is non-Cowork — should still pass)
        run: |
          # CI runs in a fresh GitHub runner, not a Cowork session. The preflight
          # script must still pass (no /sessions/*/mnt/outputs path), proving the
          # check works correctly in non-Cowork environments too.
          bash assets/preflight.sh --profile core

      - name: Validate machine-owned skill contracts
        run: python3 assets/skill-contract.py validate

      - name: Build (linked + inlined)
        run: |
          bash build.sh --inline

      - name: Validate linked deck (default)
        run: python3 assets/validate.py examples/sample-deck.html

      - name: Validate linked deck (--strict)
        run: python3 assets/validate.py examples/sample-deck.html --strict

      - name: Validate inlined deck (default)
        run: python3 assets/validate.py examples/sample-deck-inline.html

      - name: Validate inlined deck (--strict)
        run: python3 assets/validate.py examples/sample-deck-inline.html --strict

      - name: Repository unit tests
        # Keep this job browser-free so logic/docs/parser/publisher coverage is
        # fast and deterministic. Browser-backed tests skip here and run in the
        # dedicated smoke job below.
        run: |
          pip install pytest pyyaml jsonschema beautifulsoup4
          python3 -m pytest -q \
            tests/ \
            deck-json/tests/ \
            subskills/parser/tests/ \
            subskills/simulator/tests/ \
            log-tool/test_deck_log_diff.py

      - name: Summary
        if: always()
        run: |
          echo "=== build artifacts ==="
          ls -la examples/
          echo
          echo "=== self-check items in SKILL.md ==="
          grep -cE '^\[ \] +[0-9]+\. ' SKILL.md || true
          echo "=== audit functions in validate.py ==="
          grep -cE '^def (audit|check)_' assets/validate.py || true

  browser-smoke:
    name: Chromium gate smoke
    runs-on: ubuntu-latest
    timeout-minutes: 12

    defaults:
      run:
        working-directory: skills/feishu-deck-h5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chromium test dependencies
        run: |
          pip install pytest playwright pyyaml jsonschema beautifulsoup4 pillow
          python3 -m playwright install --with-deps chromium

      - name: Generate-profile preflight launches Chromium
        run: bash assets/preflight.sh --profile generate --json

      - name: Browser-backed validator smoke
        run: |
          bash build.sh
          python3 assets/validate.py examples/sample-deck.html --visual --json
          python3 -m pytest -q \
            deck-json/tests/test_scoped_audit.py \
            deck-json/tests/test_atomic_render.py \
            tests/test_publish_self_check.py
