name: bench

# PERF regression canary (PERF-0 / AUDIT-2026-06-17). Wires the existing
# assets/bench-render.py harness into CI so a silent perf regression — e.g.
# re-adding a Chromium launch that F-370 removed, or breaking the PERF-A
# font-probe cache — is caught over time instead of only on a manual bench.
#
# WHY SCHEDULED, NOT PER-PR: the bench times wall-clock on a shared GitHub
# runner. Per-PR wall-clock gating flakes, and a flaky gate trains people to
# ignore CI. So this runs weekly + on-demand, uploads the numbers as an
# artifact (trend history), and only HARD-FAILS on a gross (>40%) regression
# against a CI-captured baseline.
#
# The committed baseline starts as a conservative, deterministic Ubuntu budget,
# so the gate is active from the first run. Replace its medians with a stable
# successful `bench-result` artifact after enough runner history exists. A
# missing/renamed baseline is a hard error: bench-render fails closed instead of
# silently turning this workflow into a no-op.

on:
  schedule:
    - cron: '0 6 * * 1'      # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  perf-bench:
    name: perf regression canary
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: skills/feishu-deck-h5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps + Chromium
        # Unlike validate.yml (deliberately browser-less), the bench MUST have a
        # real Chromium — the whole point is to time the cold-start tax. Without
        # it, render_advisory would time the 0-browser fast path (~0.5s) and the
        # numbers would be meaningless.
        run: |
          pip install playwright pyyaml jsonschema beautifulsoup4 pytest pillow
          python3 -m playwright install --with-deps chromium

      - name: Verify deterministic performance contracts
        # These pin the non-wall-clock regressions that shared runners cannot
        # measure reliably: pre-init scope/image filtering, one browser for the
        # two publisher self-check sides, one real asset-upload pass, and the
        # fail-closed baseline contract.
        run: |
          python3 -m pytest -q \
            deck-json/tests/test_scoped_audit.py \
            deck-json/tests/test_bench_render_regress.py \
            tests/test_publish_self_check.py \
            tests/test_publish_preflight_integration.py \
            -k 'not end_to_end'

      - name: Bench the corpus
        # golden-gate (3p) is the fixed-cost canary: it captures the dominant
        # per-launch cold-start + scoped/full visual-gate + font-probe-cache cost
        # regardless of page count.
        run: |
          python3 assets/bench-render.py \
            deck-json/tests/fixtures/golden-gate/deck.json \
            --runs 5 \
            --out bench-result.json \
            --compare assets/bench-baseline.ci.json \
            --fail-on-regress 40 \
            --noise-floor 50

      - name: Upload bench result (trend history)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-result
          path: skills/feishu-deck-h5/bench-result.json
          if-no-files-found: warn
