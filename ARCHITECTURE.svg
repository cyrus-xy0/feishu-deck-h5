    <rect class="node" x="1020" y="424" width="180" height="40" fill="#243447" stroke="#5a7a9a" stroke-width="1.4"/>
    <text class="nt" x="1032" y="448">Publisher 发布</text>

    <path class="edge" d="M260,416 L300,416" marker-end="url(#arr)"/>
    <path class="edge" d="M500,416 L540,416" marker-end="url(#arr)"/>
    <path class="edge" d="M740,416 L780,416" marker-end="url(#arr)"/>
    <path class="edge" d="M980,402 L1018,396" marker-end="url(#arr)"/>
    <path class="edge" d="M980,430 L1018,444" marker-end="url(#arr)"/>
    <text class="elbl" x="986" y="392">通过</text>
