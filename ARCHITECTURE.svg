  <rect class="node" x="70" y="224" width="420" height="70" fill="#1f3a5f" stroke="#4a90d9" stroke-width="1.5"/>
  <text class="nt" x="90" y="250">Router 路由锁定</text>
  <text class="ns" x="90" y="270">Mode · Scope · Target</text>
  <text class="ns" x="90" y="286">锁定最小作用域，超界即停</text>
  <rect class="node" x="520" y="224" width="430" height="70" fill="#1f3a5f" stroke="#4a90d9" stroke-width="1.5"/>
  <text class="nt" x="540" y="248">Hard Gates 硬性门禁</text>
  <text class="ns" x="540" y="266">① 必走 DeckJSON/render-deck  ② 先设计后渲染</text>
  <text class="ns" x="540" y="282">③ 默认 raw-first  ④ 交付/发布前必校验</text>
  <rect class="node" x="980" y="224" width="430" height="70" fill="#1f3a5f" stroke="#4a90d9" stroke-width="1.5"/>
  <text class="nt" x="1000" y="248">Multi-Agent Dispatch</text>
  <text class="ns" x="1000" y="266">可用时每步派发 worker 子代理</text>
  <text class="ns" x="1000" y="282">依赖链保持串行</text>

  <path class="edge" d="M740,308 L740,338" marker-end="url(#arr)"/>
