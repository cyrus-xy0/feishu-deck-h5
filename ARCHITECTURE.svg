<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 1620" font-family="-apple-system,'PingFang SC','Microsoft YaHei',Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7d8aa0"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4ad98f"/>
    </marker>
    <style>
      .band{rx:14;ry:14;}
      .lbl{fill:#9fb0c7;font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;}
      .node{rx:9;ry:9;}
