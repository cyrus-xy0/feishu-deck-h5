  <text class="ns" x="740" y="147" text-anchor="middle">解析 / 设计 / 渲染 / 校验 / 编辑 / 翻译 / 发布</text>
  <path class="edge" d="M740,154 L740,184" marker-end="url(#arr)"/>

  <!-- ===== Controller band ===== -->
