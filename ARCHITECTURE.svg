      .edgeG{stroke:#4ad98f;stroke-width:1.6;fill:none;}
      .elbl{fill:#8c99ad;font-size:10.5px;}
    </style>
  </defs>

  <rect x="0" y="0" width="1480" height="1620" fill="#0d1117"/>

  <!-- Title -->
  <text x="40" y="46" fill="#ffffff" font-size="26" font-weight="700">feishu-deck-h5 · 技术架构</text>
  <text x="40" y="72" fill="#8c99ad" font-size="14">控制器路由调度 · 8 子技能实现 · DeckJSON 唯一中间层 · 确定性渲染 · 校验门禁 · 飞书云发布</text>
  <line x1="40" y1="88" x2="1440" y2="88" stroke="#222b38" stroke-width="1"/>

  <!-- User -->
  <rect class="node" x="540" y="108" width="400" height="46" fill="#1a2230" stroke="#3a4658" stroke-width="1.5"/>
