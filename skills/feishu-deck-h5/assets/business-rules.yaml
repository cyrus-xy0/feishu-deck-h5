R-RAW-LOOKS-SCHEMA:
  concern:     "C · 复用时会打架"
  symptom:     "这页是手搓的 (raw), 但内容其实就是一排标准卡片 (图标+标题+正文)"
  consequence: "手搓标准形状 = 多花功夫 / 更容易出格 / 更难改, 没有设计增益 (建议性)"
  fix:
