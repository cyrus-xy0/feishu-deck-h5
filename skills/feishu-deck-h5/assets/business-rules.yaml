R-VIS-TITLE-POSITION:
  concern:     "A · 客户看不见"
  symptom:     "这一页标题位置不对"
  consequence: "标题没落在该在的位置, 版面不规整"
  fix:
    - "把标题放回标准位置"

R-VIS-PEER-SIZE:
  concern:     "A · 客户看不见"
