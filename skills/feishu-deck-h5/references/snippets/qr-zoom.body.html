<div class="qr-zoom" data-allow-overlap>
  <input class="qr-zoom__toggle" id="REPLACE_QR_ID" type="checkbox" aria-hidden="true">
  <label class="qr-zoom__trigger" for="REPLACE_QR_ID" role="button"
         aria-label="放大二维码">
    <img src="REPLACE_QR_ASSET" alt="二维码">
    <span>点击放大</span>
  </label>

  <div class="qr-zoom__modal" data-allow-overlap>
    <label class="qr-zoom__backdrop" for="REPLACE_QR_ID" role="button"
           aria-label="关闭二维码"></label>
    <div class="qr-zoom__dialog" role="dialog" aria-modal="true"
         aria-label="扫码二维码">
      <label class="qr-zoom__close" for="REPLACE_QR_ID" role="button"
             aria-label="关闭二维码">×</label>
      <img src="REPLACE_QR_ASSET" alt="二维码">
      <p>打开手机扫一扫</p>
    </div>
  </div>
</div>
