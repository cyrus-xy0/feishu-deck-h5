{
  "schema_version": 1,
  "description": "Authoritative lifecycle gates. Documentation and CLI help must refer to these gate IDs.",
  "gates": {
    "SOURCE_PARSE": {
      "command": "parser-specific",
      "scope": "source bundle",
      "blocking": true
    },
    "TEMPLATE_PACK": {
      "command": "python3 schema/validate-contract.py --schema schema/template-dossier.schema.json --instance <template-dossier.json> && python3 schema/validate-contract.py --schema schema/template-pack.schema.json --instance <template-pack.json> && python3 deck-json/template-pack.py validate <template-pack.json> --verify-assets",
      "scope": "template dossier, draft pack, assets, preview, role coverage, and approval record",
      "blocking": true,
      "requires_user_approval": true,
      "approval_transition": "draft to immutable approved version"
    },
    "INTERMEDIATE_EDIT": {
      "command": "render-deck.py <deck.json> <output-dir> --scope <keys> --shoot",
      "scope": "changed slides",
      "blocking": true
    },
    "LOCAL_HANDOFF": {
      "command": "render-deck.py <deck.json> <output-dir> --final",
      "scope": "whole deck",
      "blocking": true
    },
    "RUNTIME_UPGRADE": {
      "command": "python3 subskills/runtime-upgrader/upgrade.py --deck-json <deck.json> --to current",
      "scope": "source-backed whole-deck candidate in a new run",
      "blocking": true,
      "requires_whole_deck_visual_gate": true,
      "artifact_state_on_pass": "READY",
      "ready_is_published": false
    },
    "MAGIC_PUBLISH": {
      "command": "subskills/publisher/publish.py <index.html>",
      "scope": "publish artifact resources and references",
      "blocking": true,
      "requires_whole_deck_visual_gate": false
    },
    "MIAODA_PUBLISH": {
      "command": "subskills/miaoda-publisher/publish.py <index.html>",
      "scope": "one independent deck app plus catalog manifest and navigation app refresh",
      "blocking": true,
      "requires_whole_deck_visual_gate": false
    },
    "PUBLISH_RECOVERY": {
      "command": "python3 assets/skill-contract.py validate && python3 -m pytest -q tests/test_magic_page_assets.py tests/test_magic_asset_faas.py tests/test_magic_iframe_faas.py tests/test_magic_page_preflight.py tests/test_publish_preflight_integration.py tests/test_publish_self_check.py",
      "scope": "publisher code touched by the current delivery blocker plus one live or dry-run artifact replay",
      "blocking": true,
      "requires_repository_release_gate": false,
      "delivery_time_budget_seconds": 600
    },
    "LIBRARY_INGEST": {
      "command": "subskills/importer/ingest.py",
      "scope": "package resources plus candidate contract",
      "blocking": true,
      "requires_whole_deck_visual_gate": false
    },
    "PRESENTATION_CHECKPOINT": {
      "command": "render-deck.py <deck.json> <output-dir> --final",
      "scope": "whole deck",
      "blocking": true
    },
    "CHECK_ONLY": {
      "command": "assets/check-only.sh <index.html>",
      "scope": "requested deck or pages",
      "blocking": false
    },
    "REPOSITORY_CHANGE": {
      "command": "python3 assets/skill-contract.py validate && python3 -m pytest -q tests deck-json/tests subskills/parser/tests subskills/simulator/tests log-tool/test_deck_log_diff.py",
      "scope": "changed code and contracts",
      "blocking": true
    }
  },
  "execution_policy": {
    "authoring": {
      "pass_closes_authoring": true,
      "formal_fix_renders_max": 1,
      "reopen_on": [
        "user_requested_change",
        "blocking_authoring_gate",
        "visible_defect_in_authoring_artifact"
      ],
      "do_not_reopen_on": [
        "advisory_only",
        "optional_polish",
        "packaging_runtime_failure"
      ]
    },
    "delivery": {
      "one_shape_per_request": true,
      "verify_only_selected_shape": true,
      "package_repro_attempts_max": 1,
      "package_failure_mode": "MAINTENANCE",
      "publish_failure_mode": "PUBLISH_RECOVERY",
      "preserve_last_good_authoring_artifact": true
    }
  }
}
